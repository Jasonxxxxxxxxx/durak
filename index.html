<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durak</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap');
:root{--bg:#0d0a07;--felt:#1a3a2a;--gold:#c9a84c;--gold2:#e8c96a;--cream:#f5e6c8;--text:#e8d5a3;--muted:#8a7a5a;--card-w:68px;--card-h:98px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Crimson Pro',Georgia,serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* LOBBY */
#lobbyScreen{background:radial-gradient(ellipse at 50% 30%,#2a1a0a,#0d0a07);padding:2rem;gap:2rem;position:relative;overflow:hidden;}
#lobbyScreen::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 60px,rgba(201,168,76,.03) 60px,rgba(201,168,76,.03) 61px);pointer-events:none;}
.logo{text-align:center;}
.logo h1{font-family:'Playfair Display',serif;font-size:clamp(3rem,10vw,6rem);font-weight:900;letter-spacing:.1em;background:linear-gradient(135deg,#c9a84c,#e8c96a 40%,#c9a84c 60%,#a07830);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.logo p{font-size:1.1rem;color:var(--muted);letter-spacing:.3em;text-transform:uppercase;margin-top:.5rem;}
.panel{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:2rem 2.5rem;width:min(460px,95vw);backdrop-filter:blur(10px);}
.panel h2{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold);margin-bottom:1.5rem;text-align:center;}
label{display:block;font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;margin-top:1rem;}
input,select{width:100%;background:rgba(0,0,0,.4);border:1px solid rgba(201,168,76,.25);border-radius:8px;padding:.75rem 1rem;color:var(--cream);font-size:1.1rem;font-family:'Crimson Pro',serif;outline:none;transition:border-color .2s;}
input:focus,select:focus{border-color:var(--gold);}
select option{background:#1a1208;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;background:linear-gradient(135deg,#c9a84c,#a07830);color:#0d0a07;border:none;border-radius:10px;padding:.85rem 1.8rem;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;letter-spacing:.08em;cursor:pointer;transition:all .2s;width:100%;margin-top:1.5rem;}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
.btn.secondary{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.3);}
.btn.danger{background:linear-gradient(135deg,#8b2020,#c0392b);color:#fff;}
.divider{text-align:center;color:var(--muted);margin:1rem 0;font-size:.9rem;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:rgba(201,168,76,.2);}
.divider::before{left:0;}.divider::after{right:0;}
.room-code-display{background:rgba(0,0,0,.5);border:2px solid var(--gold);border-radius:10px;padding:1rem;text-align:center;margin:1rem 0;}
.room-code-display .code{font-family:'Playfair Display',serif;font-size:2.5rem;color:var(--gold2);letter-spacing:.3em;}
.room-code-display p{font-size:.85rem;color:var(--muted);margin-top:.3rem;}
.player-list{margin-top:1rem;display:flex;flex-direction:column;gap:.5rem;}
.player-item{display:flex;align-items:center;gap:.7rem;padding:.5rem .8rem;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(201,168,76,.1);font-size:1rem;}
.player-item .dot{width:8px;height:8px;border-radius:50%;background:#2ecc71;flex-shrink:0;}
.player-item.host .dot{background:var(--gold);}
.error-msg{color:#e74c3c;font-size:.9rem;text-align:center;margin-top:.5rem;min-height:1.2em;}
.spinner{width:24px;height:24px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* GAME TABLE */
#gameScreen{background:var(--felt);background-image:radial-gradient(ellipse at 50% 50%,rgba(26,70,42,.8),rgba(10,25,18,.95)),repeating-linear-gradient(0deg,transparent,transparent 30px,rgba(0,0,0,.05) 30px,rgba(0,0,0,.05) 31px),repeating-linear-gradient(90deg,transparent,transparent 30px,rgba(0,0,0,.05) 30px,rgba(0,0,0,.05) 31px);padding:0;min-height:100vh;position:relative;overflow:hidden;align-items:stretch;justify-content:stretch;}

/* main grid: left sidebar + right content */
#gameLayout{display:grid;grid-template-columns:160px 1fr;grid-template-rows:auto 1fr auto auto;width:100%;height:100vh;max-width:1400px;margin:0 auto;padding:.4rem;gap:.4rem;}
#statusBar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:.4rem .8rem;background:rgba(0,0,0,.4);border-radius:10px;border:1px solid rgba(201,168,76,.15);flex-wrap:wrap;gap:.4rem;}
#statusBar .info{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;}
#statusBar .info span{font-size:.85rem;color:var(--muted);}
#statusBar .info span b{color:var(--gold2);}
#statusMsg{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--cream);text-align:center;flex:1;}

/* left player list sidebar */
#playerSidebar{grid-column:1;grid-row:2/5;background:rgba(0,0,0,.35);border-radius:12px;border:1px solid rgba(201,168,76,.12);padding:.5rem;display:flex;flex-direction:column;gap:.3rem;overflow-y:auto;}
#playerSidebar h3{font-family:'Playfair Display',serif;font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);text-align:center;padding-bottom:.3rem;border-bottom:1px solid rgba(201,168,76,.12);margin-bottom:.2rem;}
.sidebar-player{padding:.4rem .5rem;border-radius:8px;border:1px solid transparent;transition:border-color .2s;font-size:.8rem;}
.sidebar-player.attacker1{border-color:rgba(231,76,60,.5);background:rgba(231,76,60,.08);}
.sidebar-player.attacker2{border-color:rgba(230,126,34,.5);background:rgba(230,126,34,.08);}
.sidebar-player.defender{border-color:rgba(46,204,113,.5);background:rgba(46,204,113,.08);}
.sidebar-player.finished{opacity:.45;}
.sidebar-player .sp-name{font-weight:600;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sidebar-player .sp-cards{font-size:.75rem;color:var(--muted);}
.sidebar-player .sp-role{font-size:.65rem;padding:.1rem .3rem;border-radius:4px;margin-top:.2rem;display:inline-block;}
.sp-role.r-atk1{background:rgba(231,76,60,.25);color:#e74c3c;}
.sp-role.r-atk2{background:rgba(230,126,34,.25);color:#e67e22;}
.sp-role.r-def{background:rgba(46,204,113,.2);color:#2ecc71;}
.sp-role.r-done{background:rgba(255,215,0,.15);color:#ffd700;}
.sp-role.r-idle{background:rgba(255,255,255,.06);color:var(--muted);}

/* right game content */
#gameRight{grid-column:2;grid-row:2;display:flex;flex-direction:column;gap:.4rem;min-height:0;}
#opponentsArea{display:flex;align-items:flex-start;justify-content:center;gap:.8rem;flex-wrap:wrap;padding:.3rem;}
.opponent-zone{display:flex;flex-direction:column;align-items:center;gap:.3rem;}
.opponent-name{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;justify-content:center;}
.role-badge{font-size:.6rem;padding:.1rem .35rem;border-radius:4px;background:rgba(192,57,43,.3);color:#e74c3c;border:1px solid rgba(192,57,43,.4);}
.role-badge.defender{background:rgba(46,204,113,.2);color:#2ecc71;border-color:rgba(46,204,113,.4);}
.role-badge.atk2{background:rgba(230,126,34,.2);color:#e67e22;border-color:rgba(230,126,34,.4);}
.opponent-cards{display:flex;}
.card-back{width:var(--card-w);height:var(--card-h);border-radius:8px;background:linear-gradient(135deg,#1a0a2e,#0d1a3a);border:2px solid rgba(201,168,76,.5);box-shadow:0 4px 12px rgba(0,0,0,.5);margin-left:-22px;position:relative;overflow:hidden;}
.card-back:first-child{margin-left:0;}
.card-back::after{content:'🃏';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;opacity:.3;}

/* field */
#fieldWrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;}
#playField{display:flex;align-items:center;justify-content:center;gap:1.2rem;flex-wrap:wrap;padding:.8rem 4.5rem;background:rgba(0,0,0,.2);border-radius:16px;border:1px solid rgba(201,168,76,.1);min-height:170px;width:100%;transition:background .15s;}
#playField.drop-over-field{background:rgba(201,168,76,.1);outline:3px dashed rgba(201,168,76,.5);}
.attack-pair{display:flex;flex-direction:column;align-items:center;padding:3px;border-radius:10px;transition:outline .1s,background .1s;}
.attack-pair.drop-over{outline:3px dashed #ffd700;background:rgba(255,215,0,.08);}
#playPairs{display:flex;gap:.8rem;flex-wrap:wrap;align-items:center;justify-content:center;}
#trumpDisplay{position:absolute;left:.5rem;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:.2rem;}
#trumpLabel{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
#trumpSuit{font-size:1.8rem;}
#deckArea{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;align-items:center;gap:.3rem;}
#deckCount{font-size:.75rem;color:var(--muted);}

/* Trump face-up card in deck */
#trumpFaceCard{margin-top:.2rem;transform:rotate(90deg);transform-origin:center center;}

/* CARDS */
.card{width:var(--card-w);height:var(--card-h);border-radius:8px;background:#fff;border:2px solid #ddd;box-shadow:0 4px 12px rgba(0,0,0,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:default;user-select:none;transition:transform .15s,box-shadow .15s;flex-shrink:0;}
.card.playable{cursor:grab;border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,76,.5),0 4px 12px rgba(0,0,0,.4);}
.card.playable:hover{transform:translateY(-10px);box-shadow:0 0 20px rgba(201,168,76,.7),0 8px 20px rgba(0,0,0,.5);}
.card.selected{transform:translateY(-14px);border-color:#e8c96a;box-shadow:0 0 24px rgba(232,201,106,.8),0 8px 24px rgba(0,0,0,.5);}
.card.dragging{opacity:.28;transform:translateY(-4px);}
.card .rank{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;line-height:1;position:absolute;top:3px;left:5px;}
.card .rank-bottom{position:absolute;bottom:3px;right:5px;transform:rotate(180deg);}
.card .suit{font-size:1.8rem;line-height:1;}
.card.red .rank,.card.red .suit{color:#c0392b;}
.card.black .rank,.card.black .suit{color:#1a1a1a;}
/* Trump highlight */
.card.trump{border-color:#e8c96a;background:linear-gradient(160deg,#fff9e6,#fff3c4 60%,#ffe98a);box-shadow:0 0 10px rgba(232,201,106,.45),0 4px 12px rgba(0,0,0,.3);}
.card.trump::after{content:'★';position:absolute;top:2px;right:4px;font-size:.65rem;color:#b8860b;line-height:1;pointer-events:none;}
.card.trump.playable{border-color:#ffd700;box-shadow:0 0 16px rgba(255,215,0,.65),0 4px 14px rgba(0,0,0,.4);animation:trumpPulse 2s ease-in-out infinite;}
@keyframes trumpPulse{0%,100%{box-shadow:0 0 12px rgba(255,215,0,.55),0 4px 12px rgba(0,0,0,.4);}50%{box-shadow:0 0 28px rgba(255,215,0,.95),0 4px 18px rgba(0,0,0,.4);}}
.defense-card{margin-top:-68px;margin-left:18px;}

/* ghost */
#dragGhost{position:fixed;pointer-events:none;z-index:9999;opacity:.9;transform:rotate(6deg) scale(1.08);display:none;}

/* player hand area */
#playerArea{grid-column:2;grid-row:3;display:flex;flex-direction:column;align-items:center;gap:.3rem;}
#playerInfo{display:flex;align-items:center;gap:.8rem;}
#playerName{font-family:'Playfair Display',serif;font-size:1rem;color:var(--cream);}
#playerRole{font-size:.75rem;padding:.15rem .5rem;border-radius:6px;background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3);}
#playerHand{display:flex;justify-content:center;flex-wrap:wrap;gap:.25rem;}

/* action bar */
#actionBar{grid-column:2;grid-row:4;display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;padding:.3rem;}
.action-btn{padding:.5rem 1.1rem;border-radius:8px;border:none;font-family:'Playfair Display',serif;font-size:.88rem;cursor:pointer;transition:all .15s;font-weight:700;}
.action-btn:disabled{opacity:.3;cursor:not-allowed;}
#btnTake{background:linear-gradient(135deg,#8b2020,#c0392b);color:#fff;}
#btnTake:hover:not(:disabled){filter:brightness(1.2);}
#btnPass{background:linear-gradient(135deg,#1a5c2a,#27ae60);color:#fff;}
#btnPass:hover:not(:disabled){filter:brightness(1.2);}
#btnTransfer{background:linear-gradient(135deg,#1a3a5c,#2980b9);color:#fff;}
#btnTransfer:hover:not(:disabled){filter:brightness(1.2);}

/* toast */
#toast{position:fixed;top:1.2rem;left:50%;transform:translateX(-50%) translateY(-120px);background:rgba(15,10,5,.96);border:1px solid var(--gold);border-radius:10px;padding:.7rem 1.4rem;font-family:'Playfair Display',serif;font-size:.95rem;color:var(--cream);z-index:1000;transition:transform .4s cubic-bezier(.34,1.56,.64,1);text-align:center;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.6);max-width:90vw;}
#toast.show{transform:translateX(-50%) translateY(0);}

/* center announcement overlay */
#centerAnnounce{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(10,8,5,.96);border:2px solid var(--gold);border-radius:18px;padding:1.5rem 2.5rem;font-family:'Playfair Display',serif;text-align:center;z-index:500;pointer-events:none;opacity:0;transition:opacity .3s,transform .35s cubic-bezier(.34,1.56,.64,1);max-width:80vw;}
#centerAnnounce.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
#centerAnnounce .ca-title{font-size:1.4rem;font-weight:700;color:var(--gold2);margin-bottom:.5rem;}
#centerAnnounce .ca-body{font-size:1rem;color:var(--cream);line-height:1.5;}

/* personal role notification (bottom-center, above hand) */
#roleNotify{position:fixed;bottom:9rem;left:50%;transform:translateX(-50%) translateY(60px);background:rgba(10,8,5,.95);border:1px solid var(--gold);border-radius:10px;padding:.6rem 1.2rem;font-family:'Playfair Display',serif;font-size:.9rem;color:var(--gold2);z-index:400;pointer-events:none;opacity:0;transition:opacity .3s,transform .3s cubic-bezier(.34,1.56,.64,1);text-align:center;}
#roleNotify.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* end screen */
#endScreen{background:radial-gradient(ellipse at 50% 50%,#1a0a00,#0d0a07);text-align:center;gap:1.5rem;padding:2rem;}
#endTitle{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,8vw,5rem);font-weight:900;}
#endTitle.loser{color:#c0392b;}
#endTitle.winner{color:var(--gold2);}
#endMsg{font-size:1.3rem;color:var(--muted);}
.end-results{display:flex;flex-direction:column;gap:.5rem;margin:.5rem 0;}
.end-player-row{padding:.5rem 1rem;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.15);font-size:1rem;}
.end-player-row.loser-row{background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.4);}
.end-player-row.winner-row{background:rgba(46,204,113,.1);border-color:rgba(46,204,113,.3);}
#rematchRow{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center;}
.rematch-btn{padding:.5rem 1.2rem;border-radius:8px;border:1px solid rgba(201,168,76,.3);background:rgba(201,168,76,.1);color:var(--gold);font-family:'Playfair Display',serif;font-size:.9rem;cursor:pointer;}
.rematch-btn.ready{background:rgba(46,204,113,.2);border-color:rgba(46,204,113,.5);color:#2ecc71;}

#connStatus{position:fixed;bottom:.6rem;right:.6rem;font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:.35rem;background:rgba(0,0,0,.5);padding:.25rem .6rem;border-radius:20px;border:1px solid rgba(255,255,255,.08);}
#connDot{width:7px;height:7px;border-radius:50%;background:#2ecc71;transition:background .3s;}
#connDot.disconnected{background:#e74c3c;}

@media(max-width:700px){
  #gameLayout{grid-template-columns:1fr;grid-template-rows:auto auto 1fr auto auto;}
  #playerSidebar{grid-column:1;grid-row:2;flex-direction:row;flex-wrap:wrap;height:auto;overflow-x:auto;}
  #gameRight{grid-column:1;grid-row:3;}
  #playerArea{grid-column:1;grid-row:4;}
  #actionBar{grid-column:1;grid-row:5;}
  :root{--card-w:52px;--card-h:76px;}
  .card .rank{font-size:.9rem;}
  .card .suit{font-size:1.4rem;}
}
</style>
</head>
<body>
<div id="toast"></div>
<div id="dragGhost"></div>
<div id="centerAnnounce"><div class="ca-title" id="caTitle"></div><div class="ca-body" id="caBody"></div></div>
<div id="roleNotify" id="roleNotify"></div>
<div id="connStatus"><span id="connDot"></span><span id="connText">Verbinden…</span></div>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen active">
  <div class="logo"><h1>DURAK</h1><p>Das russische Kartenspiel</p></div>
  <div class="panel" id="namePanel">
    <h2>Willkommen</h2>
    <label>Dein Name</label>
    <input type="text" id="inputName" placeholder="Name eingeben…" maxlength="16" autocomplete="off">
    <div class="error-msg" id="nameError"></div>
    <button class="btn" onclick="goToLobbyOptions()">Weiter →</button>
  </div>
  <div class="panel" id="lobbyOptions" style="display:none">
    <h2>Spielraum</h2>
    <button class="btn" onclick="createRoom()">🏠 Raum erstellen</button>
    <div class="divider">oder</div>
    <label>Raumcode eingeben</label>
    <input type="text" id="inputRoomCode" placeholder="z.B. ABC123" maxlength="6" style="text-transform:uppercase;letter-spacing:.2em;text-align:center">
    <div class="error-msg" id="joinError"></div>
    <button class="btn secondary" onclick="joinRoom()">🔗 Raum beitreten</button>
  </div>
  <div class="panel" id="waitingPanel" style="display:none">
    <h2>Warteraum</h2>
    <div class="room-code-display"><div class="code" id="displayCode">------</div><p>Teile diesen Code mit deinen Freunden</p></div>
    <label>Spieler im Raum</label>
    <div class="player-list" id="playerList"></div>
    <div class="error-msg" id="waitError"></div>
    <label style="margin-top:1.2rem">Spieler (2–6)</label>
    <select id="selectPlayers">
      <option value="2">2 Spieler</option><option value="3">3 Spieler</option>
      <option value="4" selected>4 Spieler</option><option value="5">5 Spieler</option><option value="6">6 Spieler</option>
    </select>
    <button class="btn" id="btnStart" onclick="startGame()" disabled>Spiel starten ▶</button>
    <button class="btn danger" onclick="leaveRoom()" style="margin-top:.5rem">Raum verlassen</button>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div id="gameLayout">
    <div id="statusBar">
      <div class="info"><span>Stapel: <b id="deckCountTop">36</b></span></div>
      <div id="statusMsg">Warte…</div>
      <div class="info"><span id="roundInfo">Runde 1</span></div>
    </div>
    <div id="playerSidebar"><h3>Spieler</h3></div>
    <div id="gameRight">
      <div id="opponentsArea"></div>
      <div id="fieldWrap">
        <div id="trumpDisplay"><div id="trumpLabel">Trumpf</div><div id="trumpSuit">♠</div><div id="trumpFaceCard"></div></div>
        <div id="playField"><div id="playPairs"></div></div>
        <div id="deckArea"><div class="card-back" style="margin-left:0"></div><div id="deckCount">36</div></div>
      </div>
    </div>
    <div id="playerArea">
      <div id="playerInfo"><div id="playerName">Du</div><div id="playerRole">Zuschauer</div></div>
      <div id="playerHand"></div>
    </div>
    <div id="actionBar">
      <button class="action-btn" id="btnTake" onclick="takeCards()" disabled>Nehmen 📥</button>
      <button class="action-btn" id="btnTransfer" onclick="transferCards()" disabled>Weiterleiten ↪</button>
      <button class="action-btn" id="btnPass" onclick="passRound()" disabled>Weitergeben ✅</button>
    </div>
  </div>
</div>

<!-- END -->
<div id="endScreen" class="screen">
  <div id="endTitle">DURAK!</div>
  <div id="endMsg"></div>
  <div class="end-results" id="endResults"></div>
  <div id="rematchRow"></div>
  <button class="btn" onclick="backToLobby()" style="max-width:280px;margin-top:.5rem">Raum verlassen</button>
</div>

<script>
// ═══ PEERJS LOADER ═══
const ps = document.createElement('script');
ps.src = 'https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js';
document.head.appendChild(ps);
ps.onload = init;

// ═══ GLOBALS ═══
let myName='', myId='', roomCode='', isHost=false;
let peer=null, connections={};
let players=[];      // [{id,name}]
let gameState=null;
let myIndex=-1;
let dragCard=null, dragEl=null;
// rematch tracking
let rematchVotes=new Set(); // player indices who voted rematch

// ═══ CARDS ═══
const SUITS=['♠','♥','♦','♣'];
const RANKS=['6','7','8','9','10','J','Q','K','A'];
const RED=new Set(['♥','♦']);
const cardVal=r=>RANKS.indexOf(r);
const isRed=s=>RED.has(s);

function makeCard(rank,suit,tag){return{rank,suit,id:rank+suit+(tag??''),trump:false};}
function makeDeck(n){
  const d=[];
  for(let i=0;i<(n||1);i++) for(const s of SUITS) for(const r of RANKS) d.push(makeCard(r,s,n>1?i:''));
  return shuffle(d);
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ═══ PEERJS ═══
function init(){
  peer=new Peer({config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
  peer.on('open',id=>{myId=id;setConn('','Verbunden');});
  peer.on('error',()=>setConn('disconnected','Fehler'));
  peer.on('disconnected',()=>setConn('disconnected','Getrennt'));
  peer.on('connection',conn=>{
    conn.on('open',()=>{
      connections[conn.peer]=conn;
      conn.on('data',d=>handleMsg(d,conn.peer));
      conn.on('close',()=>{delete connections[conn.peer];if(!gameState)broadcastLobby();});
    });
  });
}
function setConn(cls,txt){document.getElementById('connDot').className=cls;document.getElementById('connText').textContent=txt;}
function send(c,m){try{c.send(m);}catch(e){}}
function broadcast(m,ex){for(const[id,c]of Object.entries(connections))if(id!==ex)send(c,m);}
function sendToHost(m){const c=Object.values(connections)[0];if(c)send(c,m);}

function handleMsg(msg,from){
  switch(msg.type){
    case 'join_request': hostHandleJoin(msg,from); break;
    case 'start_game':   clientStart(msg); break;
    case 'game_state':   clientApply(msg.state); break;
    case 'lobby_state':  clientLobby(msg); break;
    case 'action':       hostHandleAction(msg,from); break;
    case 'rematch_vote': hostHandleRematch(msg,from); break;
    case 'leave':        handleLeave(from); break;
  }
}

// ═══ LOBBY ═══
function goToLobbyOptions(){
  const n=document.getElementById('inputName').value.trim();
  if(!n){document.getElementById('nameError').textContent='Bitte gib einen Namen ein.';return;}
  myName=n;
  document.getElementById('namePanel').style.display='none';
  document.getElementById('lobbyOptions').style.display='';
}
function createRoom(){
  if(!peer||!myId){showToast('Noch nicht verbunden…');return;}
  isHost=true;
  roomCode=Math.random().toString(36).substr(2,6).toUpperCase();
  players=[{id:myId,name:myName}];myIndex=0;showWaiting();
}
function joinRoom(){
  const code=document.getElementById('inputRoomCode').value.trim().toUpperCase();
  if(code.length<4){document.getElementById('joinError').textContent='Code eingeben.';return;}
  if(!peer||!myId){showToast('Noch nicht verbunden…');return;}
  isHost=false;roomCode=code;
  document.getElementById('joinError').innerHTML='<div class="spinner"></div>';
  let conn;
  try{conn=peer.connect('DURAK'+code,{reliable:true});}catch(e){document.getElementById('joinError').textContent='Fehlgeschlagen.';return;}
  const t=setTimeout(()=>{document.getElementById('joinError').textContent='Raum nicht gefunden.';conn.close();},8000);
  conn.on('open',()=>{
    clearTimeout(t);connections['host']=conn;
    conn.on('data',d=>handleMsg(d,'host'));
    send(conn,{type:'join_request',name:myName,id:myId});
  });
  conn.on('error',()=>{clearTimeout(t);document.getElementById('joinError').textContent='Raum nicht gefunden.';});
}
function createHostPeer(){
  if(peer)peer.destroy();
  peer=new Peer('DURAK'+roomCode,{config:{iceServers:[{urls:'stun:stun.l.google.com:19302'}]}});
  peer.on('open',()=>{
    myId='DURAK'+roomCode;players[0].id=myId;
    setConn('','Host');broadcastLobby();
  });
  peer.on('connection',conn=>{
    conn.on('open',()=>{
      connections[conn.peer]=conn;
      conn.on('data',d=>handleMsg(d,conn.peer));
      conn.on('close',()=>{delete connections[conn.peer];if(!gameState)broadcastLobby();});
    });
  });
  peer.on('error',err=>{if(err.type==='unavailable-id')document.getElementById('waitError').textContent='Code vergeben.';});
}
function showWaiting(){
  document.getElementById('lobbyOptions').style.display='none';
  document.getElementById('waitingPanel').style.display='';
  document.getElementById('displayCode').textContent=roomCode;
  if(isHost){createHostPeer();renderLobbyPlayers();}
}
function hostHandleJoin(msg,fromId){
  const max=parseInt(document.getElementById('selectPlayers').value);
  if(players.length>=max){send(connections[fromId],{type:'lobby_state',error:'Raum voll!',players:[]});return;}
  if(gameState){send(connections[fromId],{type:'lobby_state',error:'Spiel läuft!',players:[]});return;}
  players.push({id:fromId,name:msg.name});broadcastLobby();
}
function broadcastLobby(){
  renderLobbyPlayers();
  broadcast({type:'lobby_state',players:players.map(p=>({id:p.id,name:p.name})),roomCode});
}
function clientLobby(msg){
  if(msg.error){document.getElementById('joinError').textContent=msg.error;return;}
  players=msg.players.map(p=>({...p}));
  myIndex=players.findIndex(p=>p.id===myId);
  roomCode=msg.roomCode;
  if(document.getElementById('waitingPanel').style.display!==''){
    document.getElementById('lobbyOptions').style.display='none';
    document.getElementById('waitingPanel').style.display='';
    document.getElementById('displayCode').textContent=roomCode;
  }
  renderLobbyPlayers();
}
function renderLobbyPlayers(){
  const list=document.getElementById('playerList');list.innerHTML='';
  players.forEach((p,i)=>{
    const d=document.createElement('div');d.className='player-item'+(i===0?' host':'');
    d.innerHTML=`<div class="dot"></div><span>${p.name}</span>${i===0?' <small style="color:var(--muted)">(Host)</small>':''}`;
    list.appendChild(d);
  });
  const btn=document.getElementById('btnStart');
  if(isHost){btn.disabled=players.length<2;btn.style.display='';document.getElementById('selectPlayers').style.display='';}
  else{btn.style.display='none';document.getElementById('selectPlayers').style.display='none';}
}
function leaveRoom(){
  if(isHost)broadcast({type:'leave'});else sendToHost({type:'leave'});
  for(const c of Object.values(connections))c.close();
  connections={};players=[];gameState=null;location.reload();
}
function handleLeave(fromId){
  const i=players.findIndex(p=>p.id===fromId);
  if(i!==-1){showToast(`${players[i].name} hat den Raum verlassen`);players.splice(i,1);if(isHost&&!gameState)broadcastLobby();}
}

// ═══ GAME INIT ═══
function startGame(){
  if(!isHost||players.length<2)return;
  rematchVotes=new Set();
  gameState=initGS();
  Object.entries(connections).forEach(([peerId,conn])=>{
    const pi=players.findIndex(p=>p.id===peerId);
    if(pi!==-1)send(conn,{type:'start_game',state:visState(pi)});
  });
  showGameScreen();
}
function clientStart(msg){
  gameState=msg.state;myIndex=msg.state.myIndex;
  players=msg.state.playerNames.map((name,i)=>({name,id:players[i]?.id||i}));
  rematchVotes=new Set();
  showGameScreen();renderGame();
}

function initGS(){
  const n=players.length;
  const numDecks=n>=5?2:1;
  const deck=makeDeck(numDecks);

  // Trump: last card stays face-up, is trump
  const trumpCard=deck[deck.length-1];
  const trumpSuit=trumpCard.suit;
  deck.forEach(c=>{c.trump=c.suit===trumpSuit;});

  // Deal 6 each, leave trump card at bottom
  const hands=players.map(()=>[]);
  let di=0;
  for(let i=0;i<6;i++)
    for(let p=0;p<n;p++)
      if(di<deck.length-1)hands[p].push(deck[di++]);

  // Who has lowest trump → attacks first
  let atkIdx=0,lowVal=99;
  hands.forEach((hand,i)=>hand.forEach(c=>{
    if(c.suit===trumpSuit&&cardVal(c.rank)<lowVal){lowVal=cardVal(c.rank);atkIdx=i;}
  }));
  const defIdx=nextActiveIdx(atkIdx,[],n);
  const atk2Idx=computeAtk2(atkIdx,defIdx,[],n);

  return {
    deck:deck.slice(di),   // remaining deck; trumpCard is at index 0 (bottom/face-up)
    trumpSuit,trumpCard,
    hands,
    attackerIdx:atkIdx,
    defenderIdx:defIdx,
    attacker2Idx:atk2Idx,   // second attacker (player before defender going backward from defender)
    field:[],               // [{attack,defense}]
    phase:'attack',         // 'attack'|'defense'|'wait_atk2' (atk2 can now add)
    round:1,
    finished:[],
    numDecks,
    transferCount:0,        // how many times transferred this round
    firstAttackerOfRound:atkIdx, // who started the round (for transfer chain)
    defHasDefended:false,   // has defender defended ≥1 card (needed before atk2 can act)
    lowestTrumpName:players[atkIdx].name, // for announcement
  };
}

// second attacker = player right before defender in turn order (skip finished)
function computeAtk2(atkIdx,defIdx,finished,n){
  if(n<=2)return -1; // no second attacker with 2 players
  // go backwards from defender
  let i=(defIdx-1+n)%n;
  let safe=0;
  while((i===atkIdx||finished.includes(i))&&safe<n){i=(i-1+n)%n;safe++;}
  if(i===atkIdx)return -1; // only one attacker possible
  return i;
}

function nextActiveIdx(from,finished,n){
  let i=(from+1)%n,safe=0;
  while(finished.includes(i)&&safe<n){i=(i+1)%n;safe++;}
  return i;
}

// ═══ VISIBLE STATE ═══
function visState(pi){
  const gs=gameState;
  return{
    ...gs,
    hands:gs.hands.map((h,i)=>i===pi?h:h.map(()=>null)),
    myIndex:pi,
    playerNames:players.map(p=>p.name),
  };
}
function broadcastGS(){
  myIndex=players.findIndex(p=>p.id===myId);
  renderGame();
  Object.entries(connections).forEach(([peerId,conn])=>{
    const pi=players.findIndex(p=>p.id===peerId);
    if(pi!==-1)send(conn,{type:'game_state',state:visState(pi)});
  });
}
function clientApply(state){
  gameState=state;myIndex=state.myIndex;
  players=state.playerNames.map((name,i)=>({name,id:players[i]?.id||i}));
  renderGame();checkEnd();
}

// ═══ ACTION DISPATCH ═══
function hostHandleAction(msg,fromId){
  if(!gameState)return;
  const pi=players.findIndex(p=>p.id===fromId);
  if(pi===-1)return;
  doAction(msg,pi);
}
function sendAction(msg){
  if(isHost)doAction(msg,myIndex);
  else sendToHost({type:'action',...msg});
}
function takeCards(){sendAction({action:'take'});}
function passRound(){sendAction({action:'pass'});}
function transferCards(){
  if(!gameState)return;
  const gs=gameState;
  if(gs.defenderIdx!==myIndex)return;
  const rank=gs.field[0].attack.rank;
  const card=(gs.hands[myIndex]||[]).find(c=>c&&c.rank===rank);
  if(!card)return;
  sendAction({action:'transfer',cardId:card.id});
}

function maxAttackCards(gs){
  // max cards that can be on field (attack side)
  const defCards=gs.hands[gs.defenderIdx].length;
  const hardLimit=gs.deck.length>0?5:6;
  return Math.min(defCards,hardLimit);
}

function doAction(msg,pIdx){
  const gs=gameState;
  const n=players.length;

  switch(msg.action){

    case 'attack':{
      // both attacker1 and attacker2 can call this
      const isAtk1=pIdx===gs.attackerIdx;
      const isAtk2=pIdx===gs.attacker2Idx;
      if(!isAtk1&&!isAtk2)return;

      // atk2 can only attack in 'defense' phase AND defender has defended ≥1
      if(isAtk2&&(!gs.defHasDefended))return;
      if(isAtk2&&gs.phase!=='defense')return;
      if(isAtk1&&gs.phase!=='attack')return;

      const cards=Array.isArray(msg.cards)?msg.cards:[msg.card];
      // check card limit
      const curFieldAttacks=gs.field.length;
      const limit=maxAttackCards(gs);
      if(curFieldAttacks+cards.length>limit)return;

      for(const card of cards){
        if(!canAttack(card,gs))return;
        if(!gs.hands[pIdx].find(c=>c&&c.id===card.id))return;
      }
      for(const card of cards){
        gs.hands[pIdx]=gs.hands[pIdx].filter(c=>c.id!==card.id);
        gs.field.push({attack:card,defense:null});
      }
      if(isAtk1)gs.phase='defense';
      // after atk2 adds, stay in defense phase
      checkWinCondAfterAction(gs);
      break;
    }

    case 'defend':{
      if(pIdx!==gs.defenderIdx)return;
      if(gs.phase!=='defense')return;
      const{attackCardId,defCardId}=msg;
      const slot=gs.field.find(s=>s.attack.id===attackCardId&&!s.defense);
      if(!slot)return;
      const dc=gs.hands[pIdx].find(c=>c&&c.id===defCardId);
      if(!dc||!canDefend(dc,slot.attack,gs))return;
      gs.hands[pIdx]=gs.hands[pIdx].filter(c=>c.id!==defCardId);
      slot.defense=dc;
      gs.defHasDefended=true;
      if(gs.field.every(s=>s.defense))gs.phase='attack';
      checkWinCondAfterAction(gs);
      break;
    }

    case 'transfer':{
      if(pIdx!==gs.defenderIdx)return;
      if(gs.phase!=='defense')return;
      if(!canTransfer(gs))return;
      const tc=gs.hands[pIdx].find(c=>c&&c.id===msg.cardId);
      if(!tc)return;
      if(tc.rank!==gs.field[0].attack.rank)return;
      gs.hands[pIdx]=gs.hands[pIdx].filter(c=>c.id!==msg.cardId);
      gs.field.push({attack:tc,defense:null});
      // old defender becomes new attacker1, next player becomes new defender
      const oldDef=gs.defenderIdx;
      gs.attackerIdx=oldDef;
      gs.defenderIdx=nextActiveIdx(oldDef,gs.finished,n);
      // new atk2 = player before new defender (but not new atk1)
      gs.attacker2Idx=computeAtk2(gs.attackerIdx,gs.defenderIdx,gs.finished,n);
      gs.defHasDefended=false;
      gs.phase='defense';
      gs.transferCount++;
      checkWinCondAfterAction(gs);
      break;
    }

    case 'take':{
      if(pIdx!==gs.defenderIdx)return;
      const all=gs.field.flatMap(s=>[s.attack,s.defense]).filter(Boolean);
      gs.hands[pIdx].push(...all);
      gs.field=[];
      refill(gs);
      // next round: skip defender, attacker = player after defender
      const nextAtk=nextActiveIdx(gs.defenderIdx,gs.finished,n);
      gs.attackerIdx=nextAtk;
      gs.defenderIdx=nextActiveIdx(nextAtk,gs.finished,n);
      gs.attacker2Idx=computeAtk2(gs.attackerIdx,gs.defenderIdx,gs.finished,n);
      gs.phase='attack';gs.round++;gs.transferCount=0;gs.defHasDefended=false;
      gs.firstAttackerOfRound=gs.attackerIdx;
      checkFinished(gs);
      sendRoleAnnounce(gs,'take');
      break;
    }

    case 'pass':{
      if(pIdx!==gs.attackerIdx)return;
      if(!gs.field.every(s=>s.defense))return;
      gs.field=[];
      refill(gs);
      const nextAtk=gs.defenderIdx;
      gs.attackerIdx=nextAtk;
      gs.defenderIdx=nextActiveIdx(nextAtk,gs.finished,n);
      gs.attacker2Idx=computeAtk2(gs.attackerIdx,gs.defenderIdx,gs.finished,n);
      gs.phase='attack';gs.round++;gs.transferCount=0;gs.defHasDefended=false;
      gs.firstAttackerOfRound=gs.attackerIdx;
      checkFinished(gs);
      sendRoleAnnounce(gs,'pass');
      break;
    }
  }
  broadcastGS();
}

// after attack/defend/transfer, check if someone can be marked finished mid-round
function checkWinCondAfterAction(gs){
  if(gs.deck.length>0)return;
  checkFinished(gs);
}

function canAttack(card,gs){
  if(gs.field.length===0)return true;
  const ranks=new Set(gs.field.flatMap(s=>[s.attack.rank,s.defense?.rank]).filter(Boolean));
  return ranks.has(card.rank);
}
function canDefend(def,atk,gs){
  if(def.id===atk.id)return false;
  if(def.suit===gs.trumpSuit&&atk.suit!==gs.trumpSuit)return true;
  if(def.suit!==atk.suit)return false;
  return cardVal(def.rank)>cardVal(atk.rank);
}
function canTransfer(gs){
  if(gs.field.length===0)return false;
  if(gs.field.some(s=>s.defense))return false;
  const rank=gs.field[0].attack.rank;
  if(!gs.field.every(s=>s.attack.rank===rank))return false;
  // Check field count won't exceed new defender's hand size
  const nextDef=nextActiveIdx(gs.defenderIdx,gs.finished,players.length);
  if(nextDef===gs.attackerIdx)return false;
  const nextDefCards=gs.hands[nextDef].filter(Boolean).length;
  if(gs.field.length+1>nextDefCards)return false; // new defender can't hold all
  return gs.hands[gs.defenderIdx].some(c=>c&&c.rank===rank);
}

function refill(gs){
  const n=players.length;
  const order=[];
  let i=gs.attackerIdx;
  for(let k=0;k<n;k++){if(!gs.finished.includes(i))order.push(i);i=(i+1)%n;}
  const dp=order.indexOf(gs.defenderIdx);
  if(dp>-1){order.splice(dp,1);order.push(gs.defenderIdx);}
  for(const pi of order)
    while(gs.hands[pi].length<6&&gs.deck.length>0)
      gs.hands[pi].push(gs.deck.pop());
}

function checkFinished(gs){
  if(gs.deck.length>0)return;
  for(let i=0;i<players.length;i++)
    if(!gs.finished.includes(i)&&gs.hands[i].filter(Boolean).length===0){
      gs.finished.push(i);
      showToast(`🎉 ${players[i].name} ist fertig!`);
    }
}

// ═══ ROLE ANNOUNCE (send to all so each can check their own role) ═══
function sendRoleAnnounce(gs,reason){
  // broadcast a special announce message so each client can show personal role notification
  const ann={
    type:'role_announce',
    attackerIdx:gs.attackerIdx,
    defenderIdx:gs.defenderIdx,
    attacker2Idx:gs.attacker2Idx,
    reason,
    names:players.map(p=>p.name),
  };
  // host checks self
  showRoleNotify(ann,myIndex);
  showCenterAnnounce(ann);
  broadcast(ann);
}

function handleMsg(msg,from){
  switch(msg.type){
    case 'join_request':  hostHandleJoin(msg,from); break;
    case 'start_game':    clientStart(msg); break;
    case 'game_state':    clientApply(msg.state); break;
    case 'lobby_state':   clientLobby(msg); break;
    case 'action':        hostHandleAction(msg,from); break;
    case 'role_announce':
      showRoleNotify(msg,myIndex);
      showCenterAnnounce(msg);
      break;
    case 'rematch_vote':  hostHandleRematch(msg,from); break;
    case 'leave':         handleLeave(from); break;
  }
}

// ═══ RENDER ═══
function renderGame(){
  if(!gameState)return;
  const gs=gameState;

  // Status bar
  document.getElementById('deckCountTop').textContent=gs.deck.length;
  document.getElementById('deckCount').textContent=gs.deck.length;
  document.getElementById('roundInfo').textContent=`Runde ${gs.round}`;

  const atkName=players[gs.attackerIdx]?.name||'?';
  const defName=players[gs.defenderIdx]?.name||'?';
  const atk2Name=gs.attacker2Idx>=0?players[gs.attacker2Idx]?.name:null;
  const myRole=getMyRole(gs);
  let statusText;
  if(myRole==='atk1')statusText='⚡ Du greifst an!';
  else if(myRole==='atk2')statusText=gs.defHasDefended?'⚡ Du kannst jetzt angreifen!':'⚡ Warte bis Verteidiger eine Karte verteidigt hat…';
  else if(myRole==='def')statusText='🛡 Du verteidigst!';
  else statusText=`${atkName} greift an → ${defName} verteidigt`+(atk2Name?` (2.Atk: ${atk2Name})`:'');
  document.getElementById('statusMsg').textContent=statusText;

  // Trump suit display
  document.getElementById('trumpSuit').textContent=gs.trumpSuit;
  document.getElementById('trumpSuit').style.color=isRed(gs.trumpSuit)?'#e74c3c':'#e8d5a3';
  // Trump face card
  const tfc=document.getElementById('trumpFaceCard');
  tfc.innerHTML='';
  if(gs.deck.length>0&&gs.trumpCard){
    const tel=makeCardEl(gs.trumpCard,true);
    tel.style.transform='rotate(90deg)';
    tel.style.marginTop='.3rem';
    tfc.appendChild(tel);
  }

  // Sidebar
  renderSidebar(gs);
  // Opponents
  renderOpponents(gs);
  // Field
  renderField(gs);
  // Hand
  renderHand(gs);

  // Buttons
  const myRoleR=getMyRole(gs);
  const isAtk1=myRoleR==='atk1';
  const isAtk2=myRoleR==='atk2';
  const isDef=myRoleR==='def';
  const isDone=gs.finished.includes(myIndex);

  document.getElementById('btnTake').disabled=isDone||!isDef||gs.field.length===0;
  document.getElementById('btnPass').disabled=isDone||!isAtk1||gs.field.length===0||!gs.field.every(s=>s.defense);
  const canTrans=!isDone&&isDef&&gs.phase==='defense'&&canTransfer(gs);
  document.getElementById('btnTransfer').disabled=!canTrans;
}

function getMyRole(gs){
  if(myIndex===gs.attackerIdx)return'atk1';
  if(myIndex===gs.attacker2Idx)return'atk2';
  if(myIndex===gs.defenderIdx)return'def';
  return'idle';
}

function renderSidebar(gs){
  const sb=document.getElementById('playerSidebar');
  const h=sb.querySelector('h3');
  sb.innerHTML='';sb.appendChild(h);
  players.forEach((p,i)=>{
    const div=document.createElement('div');
    const isDone=gs.finished.includes(i);
    let roleClass='idle',roleLabel='–';
    if(isDone){roleClass='done';roleLabel='✔ Fertig';}
    else if(i===gs.attackerIdx){roleClass='atk1';roleLabel='⚔ 1. Angreifer';}
    else if(i===gs.defenderIdx){roleClass='def';roleLabel='🛡 Verteidiger';}
    else if(i===gs.attacker2Idx){roleClass='atk2';roleLabel='⚔ 2. Angreifer';}
    const cardCount=Array.isArray(gs.hands[i])?gs.hands[i].filter(Boolean).length:0;
    div.className=`sidebar-player ${isDone?'finished':roleClass==='atk1'?'attacker1':roleClass==='atk2'?'attacker2':roleClass==='def'?'defender':''}`;
    div.innerHTML=`<div class="sp-name">${i===myIndex?'👤 ':''} ${p.name}</div><div class="sp-cards">${cardCount} Karten</div><div class="sp-role r-${roleClass}">${roleLabel}</div>`;
    sb.appendChild(div);
  });
}

function renderOpponents(gs){
  const area=document.getElementById('opponentsArea');area.innerHTML='';
  players.forEach((p,i)=>{
    if(i===myIndex)return;
    const count=Array.isArray(gs.hands[i])?gs.hands[i].filter(Boolean).length:0;
    const zone=document.createElement('div');zone.className='opponent-zone';
    let badge='';
    if(i===gs.attackerIdx)badge='<span class="role-badge">⚔️ 1.Atk</span>';
    else if(i===gs.defenderIdx)badge='<span class="role-badge defender">🛡 Def</span>';
    else if(i===gs.attacker2Idx)badge='<span class="role-badge atk2">⚔️ 2.Atk</span>';
    zone.innerHTML=`<div class="opponent-name">${p.name} (${count}) ${badge}</div><div class="opponent-cards" id="opp-${i}"></div>`;
    area.appendChild(zone);
    const cc=zone.querySelector(`#opp-${i}`);
    for(let c=0;c<count;c++){const b=document.createElement('div');b.className='card-back';cc.appendChild(b);}
  });
}

function renderField(gs){
  const pairs=document.getElementById('playPairs');pairs.innerHTML='';
  const playField=document.getElementById('playField');
  playField.classList.remove('drop-over-field');
  playField.ondragover=null;playField.ondrop=null;playField.ondragleave=null;

  const myRole=getMyRole(gs);
  const isDone=gs.finished.includes(myIndex);
  const canAtkDrop=(myRole==='atk1'&&gs.phase==='attack')||
                   (myRole==='atk2'&&gs.phase==='defense'&&gs.defHasDefended);

  if(!isDone&&canAtkDrop){
    playField.ondragover=e=>{e.preventDefault();playField.classList.add('drop-over-field');};
    playField.ondragleave=()=>playField.classList.remove('drop-over-field');
    playField.ondrop=e=>{
      e.preventDefault();playField.classList.remove('drop-over-field');
      if(dragCard&&canAttack(dragCard,gs)&&gs.field.length<maxAttackCards(gs)){
        sendAction({action:'attack',card:dragCard});dragCard=null;hideDragGhost();
      } else if(dragCard){showToast('Karte kann nicht angreifen!');dragCard=null;hideDragGhost();}
    };
  }

  gs.field.forEach(slot=>{
    const pair=document.createElement('div');pair.className='attack-pair';
    pair.appendChild(makeCardEl(slot.attack,false));
    if(slot.defense){
      const dc=makeCardEl(slot.defense,false);dc.classList.add('defense-card');pair.appendChild(dc);
    } else if(!isDone&&myRole==='def'&&gs.phase==='defense'){
      pair.ondragover=e=>{e.preventDefault();pair.classList.add('drop-over');};
      pair.ondragleave=()=>pair.classList.remove('drop-over');
      pair.ondrop=e=>{
        e.preventDefault();pair.classList.remove('drop-over');
        if(dragCard&&canDefend(dragCard,slot.attack,gs)){
          sendAction({action:'defend',defCardId:dragCard.id,attackCardId:slot.attack.id});
          dragCard=null;hideDragGhost();
        } else if(dragCard){showToast('Karte kann nicht verteidigen!');dragCard=null;hideDragGhost();}
      };
    }
    pairs.appendChild(pair);
  });
}

function renderHand(gs){
  const hand=document.getElementById('playerHand');hand.innerHTML='';
  const myCards=(gs.hands[myIndex]||[]).filter(Boolean);
  document.getElementById('playerName').textContent=players[myIndex]?.name||myName;
  const myRole=getMyRole(gs);
  const isDone=gs.finished.includes(myIndex);
  const roleLabels={atk1:'⚔️ 1. Angreifer',atk2:'⚔️ 2. Angreifer',def:'🛡 Verteidiger',idle:'👁 Zuschauer'};
  document.getElementById('playerRole').textContent=isDone?'✔ Fertig':(roleLabels[myRole]||'👁 Zuschauer');

  const rankCounts={};
  myCards.forEach(c=>{rankCounts[c.rank]=(rankCounts[c.rank]||0)+1;});

  myCards.forEach(card=>{
    let playable=false;
    if(!isDone){
      if(myRole==='atk1'&&gs.phase==='attack')playable=canAttack(card,gs)&&gs.field.length<maxAttackCards(gs);
      else if(myRole==='atk2'&&gs.phase==='defense'&&gs.defHasDefended)playable=canAttack(card,gs)&&gs.field.length<maxAttackCards(gs);
      else if(myRole==='def'&&gs.phase==='defense')playable=gs.field.some(s=>!s.defense&&canDefend(card,s.attack,gs));
    }
    const el=makeCardEl(card,false);
    if(playable){
      el.classList.add('playable');
      el.draggable=true;
      el.addEventListener('dragstart',e=>{
        dragCard=card;dragEl=el;
        setTimeout(()=>el.classList.add('dragging'),0);
        showDragGhost(card,e.clientX,e.clientY);
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setDragImage(new Image(),0,0);
      });
      el.addEventListener('dragend',()=>{el.classList.remove('dragging');hideDragGhost();dragCard=null;});
      if((myRole==='atk1'&&gs.phase==='attack')||(myRole==='atk2'&&gs.phase==='defense'&&gs.defHasDefended)){
        el.onclick=()=>sendAction({action:'attack',card});
      } else if(myRole==='def'&&gs.phase==='defense'){
        el.onclick=()=>showToast('Karte auf den Angriff ziehen oder droppen!');
      }
    }
    hand.appendChild(el);
  });

  // Multi-attack buttons
  let mb=document.getElementById('multiBar');
  if(!mb){mb=document.createElement('div');mb.id='multiBar';mb.style.cssText='display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin-top:.3rem;';hand.parentElement.insertBefore(mb,hand.nextSibling);}
  mb.innerHTML='';
  const canAtk=(myRole==='atk1'&&gs.phase==='attack')||(myRole==='atk2'&&gs.phase==='defense'&&gs.defHasDefended);
  if(canAtk&&!isDone){
    Object.entries(rankCounts).forEach(([rank,cnt])=>{
      if(cnt<2)return;
      const sample=myCards.find(c=>c.rank===rank);
      if(!sample||!canAttack(sample,gs))return;
      const remaining=maxAttackCards(gs)-gs.field.length;
      if(remaining<2)return;
      const allOfRank=myCards.filter(c=>c.rank===rank).slice(0,remaining);
      if(allOfRank.length<2)return;
      const btn=document.createElement('button');
      btn.className='action-btn';
      btn.style.cssText='background:linear-gradient(135deg,#3a1a5c,#7b2fbe);color:#fff;font-size:.8rem;padding:.35rem .8rem;';
      btn.textContent=`Alle ${allOfRank.length}× ${rank} legen`;
      btn.onclick=()=>sendAction({action:'attack',cards:allOfRank});
      mb.appendChild(btn);
    });
  }
}

function makeCardEl(card){
  const el=document.createElement('div');
  el.className='card'+(isRed(card.suit)?' red':' black')+(card.trump?' trump':'');
  el.innerHTML=`<span class="rank">${card.rank}</span><span class="suit">${card.suit}</span><span class="rank rank-bottom">${card.rank}</span>`;
  return el;
}

// ═══ DRAG GHOST ═══
function showDragGhost(card,x,y){
  const g=document.getElementById('dragGhost');g.innerHTML='';
  g.appendChild(makeCardEl(card));g.style.display='block';moveGhost(x,y);
  document.addEventListener('dragover',onDragOver);
}
function onDragOver(e){moveGhost(e.clientX,e.clientY);}
function moveGhost(x,y){const g=document.getElementById('dragGhost');g.style.left=(x-34)+'px';g.style.top=(y-48)+'px';}
function hideDragGhost(){document.getElementById('dragGhost').style.display='none';document.removeEventListener('dragover',onDragOver);}

// ═══ TOUCH DRAG ═══
(function(){
  let tc=null,te=null,tg=null;
  document.addEventListener('touchstart',e=>{
    const target=e.target.closest('.card.playable');
    if(!target)return;
    te=target;
    const allCards=(gameState?.hands?.[myIndex]||[]).filter(Boolean);
    const idx=[...document.getElementById('playerHand').children].indexOf(target);
    tc=allCards[idx];
    if(!tc)return;
    dragCard=tc;
    tg=makeCardEl(tc);
    tg.style.cssText='position:fixed;z-index:9999;opacity:.88;transform:rotate(6deg) scale(1.08);pointer-events:none;';
    document.body.appendChild(tg);
    const t=e.touches[0];
    tg.style.left=(t.clientX-34)+'px';tg.style.top=(t.clientY-48)+'px';
    te.classList.add('dragging');e.preventDefault();
  },{passive:false});
  document.addEventListener('touchmove',e=>{
    if(!tg)return;
    const t=e.touches[0];
    tg.style.left=(t.clientX-34)+'px';tg.style.top=(t.clientY-48)+'px';
    e.preventDefault();
  },{passive:false});
  document.addEventListener('touchend',e=>{
    if(!tg||!tc)return;
    const t=e.changedTouches[0];
    const dropEl=document.elementFromPoint(t.clientX,t.clientY);
    if(dropEl){
      const pair=dropEl.closest('.attack-pair');
      const field=dropEl.closest('#playField');
      const gs=gameState;const myRole=getMyRole(gs);
      if(pair&&myRole==='def'&&gs.phase==='defense'){
        const pi=[...document.getElementById('playPairs').children].indexOf(pair);
        const slot=gs.field[pi];
        if(slot&&!slot.defense&&canDefend(tc,slot.attack,gs))sendAction({action:'defend',defCardId:tc.id,attackCardId:slot.attack.id});
        else showToast('Karte kann nicht verteidigen!');
      } else if(field){
        const canAtk=(myRole==='atk1'&&gs.phase==='attack')||(myRole==='atk2'&&gs.phase==='defense'&&gs.defHasDefended);
        if(canAtk&&canAttack(tc,gs)&&gs.field.length<maxAttackCards(gs))sendAction({action:'attack',card:tc});
      }
    }
    tg.remove();tg=null;te?.classList.remove('dragging');te=null;tc=null;dragCard=null;
  },{passive:false});
})();

// ═══ ANNOUNCEMENTS ═══
let caTimeout=null,rnTimeout=null;

function showCenterAnnounce(ann){
  const el=document.getElementById('centerAnnounce');
  const names=ann.names;
  const atk1=names[ann.attackerIdx]||'?';
  const def=names[ann.defenderIdx]||'?';
  const atk2=ann.attacker2Idx>=0?names[ann.attacker2Idx]:null;
  let title='Neue Runde';
  let body=`⚔️ 1. Angreifer: <b>${atk1}</b><br>🛡 Verteidiger: <b>${def}</b>`;
  if(atk2)body+=`<br>⚔️ 2. Angreifer: <b>${atk2}</b>`;
  if(ann.reason==='take')title='Karten genommen!';
  else if(ann.reason==='pass')title='Erfolgreich verteidigt!';
  document.getElementById('caTitle').textContent=title;
  document.getElementById('caBody').innerHTML=body;
  el.classList.add('show');
  clearTimeout(caTimeout);
  caTimeout=setTimeout(()=>el.classList.remove('show'),3500);
}

function showRoleNotify(ann,myIdx){
  const el=document.getElementById('roleNotify');
  const names=ann.names;
  let txt='';
  if(myIdx===ann.attackerIdx)txt='⚔️ Du bist jetzt 1. Angreifer!';
  else if(myIdx===ann.defenderIdx)txt='🛡 Du bist jetzt Verteidiger!';
  else if(myIdx===ann.attacker2Idx)txt='⚔️ Du bist jetzt 2. Angreifer!';
  if(!txt)return;
  el.textContent=txt;el.classList.add('show');
  clearTimeout(rnTimeout);
  rnTimeout=setTimeout(()=>el.classList.remove('show'),3000);
}

// ═══ END / WIN CHECK ═══
function checkEnd(){
  if(!gameState)return;
  const gs=gameState;
  const active=players.filter((_,i)=>!gs.finished.includes(i));
  if(active.length<=1){
    const loserIdx=players.findIndex((_,i)=>!gs.finished.includes(i));
    setTimeout(()=>showEnd(gs,loserIdx),800);
  }
}

function showEnd(gs,loserIdx){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('endScreen').classList.add('active');
  const title=document.getElementById('endTitle');
  const msg=document.getElementById('endMsg');
  const results=document.getElementById('endResults');
  results.innerHTML='';
  const isLoser=loserIdx===myIndex;

  if(loserIdx<0){
    title.textContent='Unentschieden';title.className='';
    msg.textContent='Alle haben gewonnen!';
  } else if(isLoser){
    title.textContent='DURAK!';title.className='loser';
    msg.textContent='Du bist der Durak (Narr)! 🃏';
  } else {
    title.textContent='🎉 Gewonnen!';title.className='winner';
    msg.textContent=`${players[loserIdx]?.name||'?'} ist der Durak!`;
  }

  // Finish order
  const order=[...gs.finished];
  if(loserIdx>=0&&!order.includes(loserIdx))order.push(loserIdx);
  order.forEach((pi,rank)=>{
    const row=document.createElement('div');
    row.className='end-player-row'+(pi===loserIdx?' loser-row':' winner-row');
    row.textContent=`${rank+1}. ${players[pi]?.name||'?'} ${pi===loserIdx?'💀 Durak':'✔ Gewonnen'}`;
    results.appendChild(row);
  });

  // Rematch
  const remRow=document.getElementById('rematchRow');remRow.innerHTML='';
  const btn=document.createElement('button');
  btn.className='rematch-btn';btn.id='myRematchBtn';
  btn.textContent='🔄 Nochmal spielen';
  btn.onclick=()=>{
    btn.classList.add('ready');btn.textContent='✔ Bereit';
    if(isHost){
      rematchVotes.add(myIndex);
      checkRematch();
    } else {
      sendToHost({type:'rematch_vote',playerIdx:myIndex});
    }
  };
  remRow.appendChild(btn);

  const info=document.createElement('div');info.id='rematchInfo';info.style.cssText='font-size:.85rem;color:var(--muted);text-align:center;margin-top:.5rem;';
  info.textContent=`0 / ${players.length} bereit`;
  remRow.appendChild(info);
}

function hostHandleRematch(msg,fromId){
  const pi=players.findIndex(p=>p.id===fromId);
  if(pi!==-1)rematchVotes.add(pi);
  // update info for all
  broadcast({type:'rematch_update',count:rematchVotes.size,total:players.length});
  updateRematchInfo(rematchVotes.size,players.length);
  checkRematch();
}
function handleMsg_rematch_update(msg){updateRematchInfo(msg.count,msg.total);}
function updateRematchInfo(count,total){
  const el=document.getElementById('rematchInfo');
  if(el)el.textContent=`${count} / ${total} bereit`;
}
function checkRematch(){
  if(rematchVotes.size>=players.length){
    // Everyone voted – restart
    if(isHost){
      setTimeout(()=>{
        gameState=null;rematchVotes=new Set();
        startGame();
      },400);
    }
  }
}

// override handleMsg to handle rematch_update
const _origHandleMsg=handleMsg;
// already integrated in handleMsg switch above; add case here
// we patch it:
(function(){
  const orig=handleMsg;
  window.handleMsg=function(msg,from){
    if(msg.type==='rematch_update'){updateRematchInfo(msg.count,msg.total);return;}
    if(msg.type==='rematch_vote'&&isHost){hostHandleRematch(msg,from);return;}
    orig(msg,from);
  };
})();

// ═══ GAME START ANNOUNCEMENT ═══
function showGameScreen(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('gameScreen').classList.add('active');
  renderGame();
  // Announce who starts
  const gs=gameState;
  setTimeout(()=>{
    const el=document.getElementById('centerAnnounce');
    document.getElementById('caTitle').textContent='Spiel beginnt!';
    const lowestName=gs.lowestTrumpName||players[gs.attackerIdx]?.name||'?';
    const atk2=gs.attacker2Idx>=0?players[gs.attacker2Idx]?.name:null;
    let body=`<b>${lowestName}</b> hat den niedrigsten Trumpf und beginnt!<br><br>⚔️ 1. Angreifer: <b>${players[gs.attackerIdx]?.name}</b><br>🛡 Verteidiger: <b>${players[gs.defenderIdx]?.name}</b>`;
    if(atk2)body+=`<br>⚔️ 2. Angreifer: <b>${atk2}</b>`;
    document.getElementById('caBody').innerHTML=body;
    el.classList.add('show');
    clearTimeout(caTimeout);
    caTimeout=setTimeout(()=>el.classList.remove('show'),5000);
    // Personal role notify
    showRoleNotify({
      attackerIdx:gs.attackerIdx,defenderIdx:gs.defenderIdx,
      attacker2Idx:gs.attacker2Idx,names:players.map(p=>p.name)
    },myIndex);
    if(gs.numDecks===2)showToast('🃏🃏 Doppeldeck aktiv! (5+ Spieler)');
  },300);
}

function backToLobby(){location.reload();}

// ═══ TOAST ═══
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),3000);
}

document.getElementById('inputName').addEventListener('keydown',e=>{if(e.key==='Enter')goToLobbyOptions();});
document.getElementById('inputRoomCode').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom();});
